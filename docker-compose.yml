services:

  # Netflyx App
  netflix-frontend:
    build:
      context: .
    image: harshal2op/netflix:latest
    env_file:
      .env
    container_name: netflix-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3 
    networks:
      - netflix-net

networks:
  netflix-net:
