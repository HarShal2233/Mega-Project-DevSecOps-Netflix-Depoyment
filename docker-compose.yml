services:

  # Netflyx App
  netflix-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TMDB_V3_API_KEY: ${TMDB_V3_API_KEY}
    container_name: netflix-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3 
    networks:
      - netflix-net

networks:
  netflix-net:
