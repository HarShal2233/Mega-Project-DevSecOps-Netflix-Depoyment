apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netflix-app
  namespace: netflix-nm
  labels:
    app.kubernetes.io/name: netflix-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: netflix.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service: 
            name: netflix-app 
            port: 
              number: 80
