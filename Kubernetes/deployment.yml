apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app
  namespace: netflix-nm
  labels:
    app: netflix-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-app

  template:
    metadata:
      labels:
        app: netflix-app

    spec:
      containers:
        - name: netflix-app
          image: harshal2op/netflix:latest
          ports:
            - containerPort: 80

          env:
            - name: TMDB_V3_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netflix-secret
                  key: TMDB_V3_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"