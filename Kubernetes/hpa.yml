kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: netflix-app-hpa
  namespace: netflix-nm

spec:
  scaleTargetRef:
    kind: Deployment
    name: netflix-app
    apiVersion: apps/v1

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 6

